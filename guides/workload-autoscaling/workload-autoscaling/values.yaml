# WVA Configuration for granite-34b deployment in dolev-llmd namespace
# This configures WVA to autoscale based on saturation metrics

# Connection to existing llm-d deployment
llmd:
  namespace: dolev-llmd  # Namespace where your granite-34b deployment exists
  modelName: ms-granite34b-llm-d-modelservice  # Your model service deployment name
  modelID: "ibm-granite/granite-34b-code-instruct-8k"  # Must match your deployment

# Accelerator configuration
va:
  accelerator: A100  # NVIDIA A100 GPUs as specified
  
# WVA Controller configuration
wva:
  # Prometheus configuration for OpenShift
  prometheus:
    monitoringNamespace: openshift-user-workload-monitoring
    baseURL: "https://thanos-querier.openshift-monitoring.svc.cluster.local:9091"
    serviceAccountName: "prometheus-k8s"
    tls:
      insecureSkipVerify: true  # Set to false for production with proper CA cert
      caCertPath: ""  # Optional: set CA cert path for production
  
  # Controller settings
  controller:
    replicas: 1
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
  
  # Metrics collection interval
  metricsInterval: 30s
  
  # SLO configuration for autoscaling decisions
  slo:
    # Target saturation percentage (0-100)
    # WVA will scale up when saturation exceeds this threshold
    targetSaturation: 70
    
    # Minimum saturation before scaling down
    minSaturation: 40
    
    # Cooldown periods to prevent flapping
    scaleUpCooldown: 60s
    scaleDownCooldown: 300s

# HPA configuration
hpa:
  enabled: true
  minReplicas: 2  # Minimum replicas (handles ~20 concurrent users)
  maxReplicas: 10  # Maximum replicas (handles ~100 concurrent users)
  
  # Scale-to-zero configuration (optional, disabled by default)
  scaleToZero:
    enabled: false  # Set to true if you want to scale to 0 during idle periods
    idleTimeout: 600s  # Time before scaling to 0
  
  # Scaling behavior
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50  # Scale up by 50% of current replicas
        periodSeconds: 60
      - type: Pods
        value: 2  # Or add 2 pods
        periodSeconds: 60
      selectPolicy: Max  # Use the policy that scales up more
    
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 minutes before scaling down
      policies:
      - type: Percent
        value: 25  # Scale down by 25% of current replicas
        periodSeconds: 60
      - type: Pods
        value: 1  # Or remove 1 pod
        periodSeconds: 60
      selectPolicy: Min  # Use the policy that scales down less

# Resource requirements for WVA components
resources:
  controller:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

